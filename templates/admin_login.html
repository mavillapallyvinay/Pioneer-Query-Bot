<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pioneer — Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Epilogue:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #05050a;
    --surface: #0f0f18;
    --accent: #4ecdc4;
    --border: rgba(78,205,196,0.2);
    --text: #f0eee8;
    --muted: #7a7888;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Epilogue', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 50% 60% at 80% 40%, rgba(78,205,196,0.07) 0%, transparent 60%);
    pointer-events: none;
  }

  .auth-box {
    width: 100%; max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3rem;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.6s ease both;
    z-index: 1;
  }

  .auth-box::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .badge {
    display: inline-block;
    background: rgba(78,205,196,0.1);
    border: 1px solid rgba(78,205,196,0.25);
    color: var(--accent);
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0.3rem 0.75rem;
    border-radius: 20px;
    margin-bottom: 1.2rem;
  }

  .auth-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 900;
    margin-bottom: 0.3rem;
    letter-spacing: -0.02em;
  }

  .auth-logo em { font-style: italic; color: var(--accent); }

  .auth-subtitle {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 2.5rem;
  }

  .alert {
    padding: 0.75rem 1rem;
    border-radius: 3px;
    font-size: 0.85rem;
    margin-bottom: 1.2rem;
    display: none;
  }

  .alert.error { background: rgba(239,71,111,0.12); border: 1px solid rgba(239,71,111,0.3); color: #ef476f; display: block; }

  label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 3px;
    padding: 0.75rem 1rem;
    color: var(--text);
    font-family: 'Epilogue', sans-serif;
    font-size: 0.9rem;
    transition: border-color 0.2s;
    outline: none;
    margin-bottom: 1.2rem;
  }

  input:focus { border-color: var(--accent); background: rgba(78,205,196,0.04); }

  .btn {
    width: 100%;
    padding: 0.85rem;
    background: var(--accent);
    color: #05050a;
    border: none;
    border-radius: 3px;
    font-family: 'Epilogue', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }

  .btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn:active { transform: none; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .back-link {
    display: inline-block;
    margin-top: 1.5rem;
    font-size: 0.75rem;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color 0.2s;
  }

  .back-link:hover { color: var(--accent); }

  @keyframes fadeUp { from { opacity:0; transform: translateY(24px) } to { opacity:1; transform: none } }
</style>
</head>
<body>
<div class="auth-box">
  <span class="badge">Admin Access</span>
  <div class="auth-logo">Pion<em>eer</em></div>
  <div class="auth-subtitle">Administrator Dashboard Login</div>

  <div id="login-alert" class="alert"></div>

  <label>Username</label>
  <input type="text" id="username" placeholder="admin"/>
  <label>Password</label>
  <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
  <button class="btn" id="login-btn" onclick="doLogin()">Access Dashboard</button>

  <a href="/" class="back-link">← Back to Role Select</a>
</div>

<script>
  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const alert = document.getElementById('login-alert');
    alert.className = 'alert';

    if (!username || !password) {
      alert.textContent = 'Please enter credentials.';
      alert.className = 'alert error';
      return;
    }

    const btn = document.getElementById('login-btn');
    btn.disabled = true; btn.textContent = 'Authenticating...';

    const res = await fetch('/admin-login', {
      method: 'POST',
      credentials: 'include',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await res.json();

    if (res.ok) {
      window.location.href = '/admin-page';
    } else {
      alert.textContent = data.message || 'Invalid credentials.';
      alert.className = 'alert error';
      btn.disabled = false; btn.textContent = 'Access Dashboard';
    }
  }
</script>
</body>
</html>
